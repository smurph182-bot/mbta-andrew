<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Andrew → Alewife</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #FF3B2F;
      --red-dim: #FF3B2F;
      --bg: #000000;
      --surface: #1C1C1C;
      --surface2: #242424;
      --border: #333333;
      --text: #FFFFFF;
      --text-dim: #AAAAAA;
      --text-muted: #555555;
      --green: #30FF6A;
      --yellow: #FFE000;
      --mono: 'DM Mono', monospace;
      --display: 'Bebas Neue', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      padding: 20px 24px 16px;
      gap: 0;
    }

    /* Header */
    .header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .station-block {}

    .line-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .line-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 10px var(--red);
      flex-shrink: 0;
    }

    .line-label {
      font-family: var(--mono);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.15em;
      color: var(--red);
      text-transform: uppercase;
    }

    .station-name {
      font-family: var(--display);
      font-size: 72px;
      line-height: 0.9;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .direction {
      font-size: 16px;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-top: 6px;
    }

    .direction span {
      color: var(--text);
    }

    .clock-block {
      text-align: right;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }

    .clock {
      font-family: var(--display);
      font-size: 72px;
      line-height: 1;
      letter-spacing: 0.03em;
      color: var(--text);
    }

    .date {
      font-size: 15px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-top: 4px;
    }

    .weather {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-top: 4px;
    }

    .weather-temp {
      font-family: var(--display);
      font-size: 36px;
      line-height: 1;
      color: var(--text);
    }

    .weather-feels {
      font-size: 13px;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 14px;
    }

    /* Train list */
    .trains {
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .train-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
      flex: 1;
      transition: border-color 0.3s;
    }

    .train-card.next {
      border-color: var(--red);
      background: #2A0000;
    }

    .train-card.next::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 6px;
      background: var(--red);
    }

    .train-card.arriving {
      border-color: var(--green);
      background: #002A10;
    }

    .train-card.arriving::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 6px;
      background: var(--green);
    }

    .train-left {}

    .train-center {
      flex: 1;
      text-align: center;
    }

    .train-seq {
      font-size: 16px;
      letter-spacing: 0.15em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .train-card.next .train-seq { color: var(--red); }
    .train-card.arriving .train-seq { color: var(--green); }

    .train-dest {
      font-family: var(--display);
      font-size: 46px;
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--text);
    }

    .train-time-label {
      font-size: 28px;
      letter-spacing: 0.06em;
      color: #FFFFFF;
      font-weight: 500;
      font-family: var(--mono);
    }

    .train-right {
      text-align: right;
    }

    .train-eta {
      font-family: var(--display);
      font-size: 90px;
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .train-card.next .train-eta { color: var(--red); }
    .train-card.arriving .train-eta { color: var(--green); }
    .train-card:not(.next):not(.arriving) .train-eta { color: #FFFFFF; }

    .train-eta-unit {
      font-size: 26px;
      letter-spacing: 0.08em;
      color: inherit;
      opacity: 0.8;
      margin-left: 2px;
    }

    .train-sched {
      font-size: 15px;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* Status bar */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .status-dot-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }

    .status-dot.stale { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); animation: none; }
    .status-dot.error { background: var(--red); box-shadow: 0 0 6px var(--red); animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .status-text {
      font-size: 13px;
      letter-spacing: 0.1em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    .refresh-info {
      font-size: 13px;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    /* Loading / error states */
    .state-msg {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-dim);
    }

    .state-msg .icon { font-size: 32px; }
    .state-msg .msg { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; }

    /* Alert banner */
    .alert-banner {
      background: #1a1200;
      border: 1px solid #3a2800;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 11px;
      letter-spacing: 0.05em;
      color: var(--yellow);
      margin-bottom: 10px;
      display: none;
    }

    .alert-banner.visible { display: block; }

    /* Scanline overlay for aesthetic */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 999;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="station-block">
      <div class="line-badge">
        <div class="line-dot"></div>
        <span class="line-label">Red Line</span>
      </div>
      <div class="station-name">ANDREW</div>
      <div class="direction">Toward <span>Alewife</span></div>
    </div>
    <div class="clock-block">
      <div class="clock" id="clock">--:--</div>
      <div class="date" id="date">---</div>
      <div class="weather">
        <span class="weather-temp" id="weatherTemp">--°</span>
        <span class="weather-feels" id="weatherFeels">Feels like --°</span>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="alert-banner" id="alertBanner"></div>

  <div class="trains" id="trainList">
    <div class="state-msg" id="loadingMsg">
      <div class="icon">⬤</div>
      <div class="msg">Fetching predictions...</div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-dot-wrap">
      <div class="status-dot" id="statusDot"></div>
      <span class="status-text" id="statusText">Connecting</span>
    </div>
    <span class="refresh-info">Refreshes every 30s</span>
  </div>

  <!-- Keep-alive: silent audio loop prevents Silk from timing out -->
  <audio id="keepAlive" loop style="display:none">
    <source src="data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=" type="audio/wav">
  </audio>

  <script>
    // ── Config ──────────────────────────────────────────────
    const STOP_ID   = 'place-andrw';   // Andrew Station
    const ROUTE_ID  = 'Red';
    const DIRECTION = 1;               // 1 = inbound (toward Alewife)
    const MAX_TRAINS = 3;
    const REFRESH_MS = 30000;
    const API_BASE  = 'https://api-v3.mbta.com';
    // ────────────────────────────────────────────────────────

    let lastUpdate = null;
    let refreshTimer = null;

    // Keep Silk alive
    const ka = document.getElementById('keepAlive');
    ka.volume = 0;
    ka.play().catch(() => {});
    // Re-attempt play every 60s as a fallback
    setInterval(() => { if (ka.paused) ka.play().catch(() => {}); }, 60000);

    // Clock
    function updateClock() {
      const now = new Date();
      let h = now.getHours();
      const m = String(now.getMinutes()).padStart(2,'0');
      const suffix = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      document.getElementById('clock').textContent = `${h}:${m} ${suffix}`;
      const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      document.getElementById('date').textContent =
        `${days[now.getDay()]} ${months[now.getMonth()]} ${now.getDate()}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Format minutes
    function minsAway(isoStr) {
      if (!isoStr) return null;
      const diff = (new Date(isoStr) - Date.now()) / 1000 / 60;
      return diff;
    }

    function fmtTime(isoStr) {
      if (!isoStr) return '';
      const d = new Date(isoStr);
      let h = d.getHours();
      const m = String(d.getMinutes()).padStart(2,'0');
      const suffix = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      return `${h}:${m} ${suffix}`;
    }

    // Build train card HTML
    function buildCard(train, index) {
      const mins = minsAway(train.arrival || train.departure);
      const sched = fmtTime(train.arrival || train.departure);

      let etaHtml, cardClass = 'train-card', seqLabel;

      if (index === 0) {
        seqLabel = 'Next train';
        cardClass += ' next';
      } else if (index === 1) {
        seqLabel = '2nd train';
      } else {
        seqLabel = '3rd train';
      }

      if (mins === null) {
        etaHtml = `<span class="train-eta">--</span>`;
      } else if (mins <= 0.5) {
        cardClass = 'train-card arriving';
        seqLabel = index === 0 ? 'Now arriving' : seqLabel;
        etaHtml = `<span class="train-eta" style="font-size:72px;color:var(--green)">NOW</span>`;
      } else if (mins < 1) {
        etaHtml = `<span class="train-eta">&lt;1<span class="train-eta-unit">min</span></span>`;
      } else {
        const m = Math.floor(mins);
        etaHtml = `<span class="train-eta">${m}<span class="train-eta-unit">min</span></span>`;
      }

      const dest = train.headsign || 'Alewife';

      return `
        <div class="${cardClass}">
          <div class="train-left">
            <div class="train-seq">${seqLabel}</div>
            <div class="train-dest">${dest.toUpperCase()}</div>
          </div>
          <div class="train-center">
            <div class="train-time-label">Arrives ${sched}</div>
          </div>
          <div class="train-right">
            ${etaHtml}
          </div>
        </div>`;
    }

    // Fetch predictions
    async function fetchTrains() {
      const dot  = document.getElementById('statusDot');
      const txt  = document.getElementById('statusText');
      const list = document.getElementById('trainList');

      try {
        const url = `${API_BASE}/predictions?filter[stop]=${STOP_ID}&filter[route]=${ROUTE_ID}&filter[direction_id]=${DIRECTION}&include=trip&sort=arrival_time&fields[prediction]=arrival_time,departure_time,direction_id,status&fields[trip]=headsign`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();

        // Build headsign lookup from included trips
        const headsigns = {};
        if (json.included) {
          for (const inc of json.included) {
            if (inc.type === 'trip') {
              headsigns[inc.id] = inc.attributes.headsign;
            }
          }
        }

        // Filter to upcoming trains
        const now = Date.now();
        const trains = (json.data || [])
          .filter(p => {
            const t = p.attributes.arrival_time || p.attributes.departure_time;
            return t && (new Date(t) - now) > -30000; // include trains up to 30s past
          })
          .slice(0, MAX_TRAINS)
          .map(p => ({
            arrival:   p.attributes.arrival_time,
            departure: p.attributes.departure_time,
            headsign:  p.relationships?.trip?.data?.id
                         ? headsigns[p.relationships.trip.data.id]
                         : 'Alewife'
          }));

        lastUpdate = new Date();
        dot.className = 'status-dot';
        txt.textContent = `Updated ${fmtTime(lastUpdate.toISOString())}`;

        if (trains.length === 0) {
          list.innerHTML = `
            <div class="state-msg">
              <div class="icon">○</div>
              <div class="msg">No predictions available</div>
            </div>`;
          return;
        }

        list.innerHTML = trains.map((t, i) => buildCard(t, i)).join('');

      } catch (err) {
        console.error(err);
        dot.className = 'status-dot error';
        txt.textContent = 'Connection error';

        if (!lastUpdate) {
          list.innerHTML = `
            <div class="state-msg">
              <div class="icon">!</div>
              <div class="msg">Could not load data</div>
            </div>`;
        }
        // Otherwise keep showing stale data
      }
    }

    // Fetch alerts (non-blocking)
    async function fetchAlerts() {
      try {
        const url = `${API_BASE}/alerts?filter[route]=${ROUTE_ID}&filter[stop]=${STOP_ID}&filter[activity]=BOARD&fields[alert]=header`;
        const res = await fetch(url);
        const json = await res.json();
        const banner = document.getElementById('alertBanner');
        const alerts = (json.data || []).filter(a => a.attributes.header);
        if (alerts.length > 0) {
          banner.textContent = '⚠ ' + alerts[0].attributes.header;
          banner.classList.add('visible');
        } else {
          banner.classList.remove('visible');
        }
      } catch (_) {}
    }

    // Weather (Open-Meteo, no API key required)
    async function fetchWeather() {
      try {
        const url = 'https://api.open-meteo.com/v1/forecast?latitude=42.3601&longitude=-71.0589&current=temperature_2m,apparent_temperature&temperature_unit=fahrenheit&wind_speed_unit=mph&forecast_days=1';
        const res = await fetch(url);
        const json = await res.json();
        const temp   = Math.round(json.current.temperature_2m);
        const feels  = Math.round(json.current.apparent_temperature);
        document.getElementById('weatherTemp').textContent  = `${temp}°F`;
        document.getElementById('weatherFeels').textContent = `Feels like ${feels}°`;
      } catch (_) {}
    }

    // Init
    fetchTrains();
    fetchAlerts();
    fetchWeather();
    refreshTimer = setInterval(() => {
      fetchTrains();
      fetchAlerts();
    }, REFRESH_MS);
    setInterval(fetchWeather, 600000); // refresh weather every 10 min
  </script>
</body>
</html>
